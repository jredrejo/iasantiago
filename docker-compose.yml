services:
  qdrant:
    image: qdrant/qdrant:v1.15.5-gpu-nvidia
    container_name: qdrant
    restart: unless-stopped
    # Qdrant mmap-ea cada fichero de segmento y los mantiene abiertos. Con 9
    # colecciones (~2600 ficheros) el límite por defecto del contenedor (1024)
    # se agota y qdrant aborta al arrancar con "Too many open files" (EMFILE,
    # exit 134) -> crash loop que tira TODO el sitio. Pasó el 2026-07-22 tras
    # una ingesta con reinicios forzados por watchdog. El host permite 1048576.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__GPU__INDEXING=1
      - TZ=${TZ}
    volumes:
      - ${QDRANT_STORAGE}:/qdrant/storage
    ports:
      # Solo localhost: qdrant se usa desde otros contenedores por red docker.
      - "127.0.0.1:6333:6333"
    healthcheck:
      # No usar `cat < /dev/tcp/...`: CMD-SHELL ejecuta /bin/sh, que aquí es dash,
      # y /dev/tcp es una construcción exclusiva de bash. El check fallaba siempre
      # ("cannot open /dev/tcp/localhost/6333") y qdrant salía unhealthy pese a
      # funcionar. La imagen no trae curl ni wget, pero sí python3.
      # /readyz comprueba disponibilidad real, no solo que el puerto esté abierto.
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6333/readyz',timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # docling-service removed - extraction now runs inside ingestor

  vllm:
    image: vllm/vllm-openai:nightly
    container_name: vllm
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 16gb
    # Sin env_file: las variables VLLM_* de .env son solo para la interpolación ${...}
    # de compose; inyectarlas al contenedor genera warnings "Unknown vLLM environment
    # variable" y arriesga colisiones con variables reales de vLLM.
    environment:
      - TZ=${TZ}
      # RTX 5090 = Blackwell sm_120. vLLM lo autodetecta, no hace falta fijarlo aquí;
      # el servicio ingestor sí fija la arch para compilar ops de torch/docling.
      # - TORCH_CUDA_ARCH_LIST=120
      - CUDA_LAUNCH_BLOCKING=0
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL}
      - VLLM_WORKER_MULTIPROC_METHOD=${VLLM_WORKER_MULTIPROC_METHOD}
      # Modelo ya cacheado en el volumen huggingface_cache; arrancar sin tocar el Hub.
      # Poner a 0 (o comentar) cuando se cambie de modelo para permitir la descarga.
      - HF_HUB_OFFLINE=1
    ports:
      - "8000:8000"

    command: >
      ${VLLM_MODEL}
      --dtype ${VLLM_DTYPE}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL_SIZE}
      --max-model-len ${VLLM_MAX_MODEL_LEN}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION}
      --kv-cache-dtype ${VLLM_KV_CACHE_DTYPE}
      --host 0.0.0.0
      --port 8000
      --chat-template /etc/vllm/chat_template.jinja
      --max-num-seqs ${VLLM_MAX_NUM_SEQS}
      --max-num-batched-tokens ${VLLM_MAX_NUM_BATCHED_TOKENS}
      --enable-prefix-caching
      --enable-chunked-prefill
      --language-model-only
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      # Plantilla de chat vendorizada: identica a la del modelo salvo que el modo
      # thinking pasa a estar desactivado por defecto (ver cabecera del fichero).
      - ./vllm/chat_template.jinja:/etc/vllm/chat_template.jinja:ro
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 30

  rag-api:
    build:
      context: ./rag-api
    container_name: rag-api
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 8gb
    env_file: .env
    environment:
      - BM25_BASE_DIR=/whoosh
      - TOPIC_BASE_DIR=/topics
    volumes:
      - ${TOPICS_HOST_DIR}:/topics:ro
      - ${WHOOSH_HOST_DIR}:/whoosh
      - huggingface_cache:/root/.cache/huggingface
      - ./rag-api:/app
      - ./data/telemetry:/data/telemetry
    ports:
      # Solo localhost: nginx (en el host) llega por 127.0.0.1:8001.
      - "127.0.0.1:8001:8001"
    depends_on:
      - vllm
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  ingestor:
    profiles:
      - ingest
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: ingestor
    restart: on-failure # Restart on crash (segfault), but not on clean exit
    # Healthcheck monitors for stuck containers (visible via docker ps)
    # Signal handler in main.py forces exit on SIGSEGV; if still stuck, use docker-autoheal
    # El umbral se deriva de WATCHDOG_TIMEOUT (por defecto 1200s) para que
    # healthcheck y watchdog no discrepen: antes el contenedor se marcaba
    # unhealthy a los 300s durante extracciones largas perfectamente sanas.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import os, time; f=os.getenv(''HEARTBEAT_FILE'', ''/tmp/ingestor_heartbeat''); t=int(os.getenv(''WATCHDOG_TIMEOUT'', ''1200'')); exit(0 if not os.path.exists(f) or time.time() - float(open(f).readline()) < t else 1)"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 16gb
    env_file: .env
    environment:
      - HF_HOME=/models_cache
      - TORCH_HOME=/root/.cache/torch
      - TRANSFORMERS_CACHE=/models_cache/transformers
      - TOPIC_BASE_DIR=/topics
      - BM25_BASE_DIR=/whoosh
      # Fuente única de verdad del watchdog: la usan main.py y el healthcheck
      - WATCHDOG_TIMEOUT=1200
      # Presupuesto de tokens por fragmento. 256 sale de un barrido medido
      # (ver core/config.py); cambiarlo obliga a re-indexar y a repetirlo.
      - CHUNK_MAX_TOKENS=256
      - HEARTBEAT_FILE=/tmp/ingestor_heartbeat
      - INGESTOR_MAX_RETRIES=3
      - MIN_IMAGE_WIDTH=100
      - MIN_IMAGE_HEIGHT=100
      - LLM_ANALYSIS_TEMPERATURE=0.3
      - TOKENIZERS_PARALLELISM=true
      - OMP_NUM_THREADS=10
      - NUMBA_NUM_THREADS=10 # Para NumPy/numba
      - MKL_NUM_THREADS=10 # Para Intel MKL
      - OPENBLAS_NUM_THREADS=10 # Para OpenBLAS
      # Docling GPU settings (now running inside ingestor)
      - DOCLING_GPU_MEMORY_FRACTION=${DOCLING_GPU_MEMORY_FRACTION:-0.30}
      # CUDA configuration for Docling (RTX 5090 = Blackwell sm_120)
      - TORCH_CUDA_ARCH_LIST=120
      - CUDA_LAUNCH_BLOCKING=0 # Ejecución async (no bloqueante)
      # PYTORCH_CUDA_ALLOC_CONF lo aporta el .env vía env_file
      - CUDA_DEVICE_ORDER=PCI_BUS_ID # Ordenamiento consistente de dispositivos
      - CUDA_VISIBLE_DEVICES=0 # Selección explícita de GPU
    volumes:
      - models_cache:/models_cache
      - ${TOPICS_HOST_DIR}:/topics
      - ${WHOOSH_HOST_DIR}:/whoosh
      - ./ingestor:/app
      - docling_cache:/cache/docling # Docling extraction cache
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      # Dos conexiones OpenAI (separadas por ';', el orden de KEYS debe coincidir
      # con el de BASE_URLS):
      #   1) rag-api  -> pipeline RAG, un modelo por tema
      #   2) vllm     -> acceso directo, solo para el Task Model (ver abajo)
      - OPENAI_API_BASE_URLS=http://rag-api:8001/v1;http://vllm:8000/v1
      - OPENAI_API_KEYS=${OPENAI_API_KEY};${OPENAI_API_KEY}
      # Task Model: las tareas internas (titulo, tags, follow-up, autocomplete)
      # van directas a vLLM en vez de atravesar todo el pipeline RAG.
      # OJO: tiene que ser TASK_MODEL_EXTERNAL, no TASK_MODEL. TASK_MODEL es para
      # *Local Models* (Ollama) y aqui no aplica porque ENABLE_OLLAMA_API=false;
      # si se deja vacio, Open WebUI cae al "current model", es decir rag-api.
      # Ver IMPROVEMENTS.md 2.3.
      - TASK_MODEL_EXTERNAL=${VLLM_MODEL}
      - ENABLE_OLLAMA_API=false
      - OLLAMA_BASE_URL=""
      - WEBUI_NAME=IA del Santiago Apóstol
      - WEBUI_URL=https://ia.santiagoapostol.net
      - ENABLE_ARENA=false
      - ENABLE_RAG=false
      # Confiar en los headers que envia oauth2-proxy
      - WEBUI_AUTH_TRUSTED_EMAIL_HEADER=X-Forwarded-Email
      - WEBUI_AUTH_TRUSTED_NAME_HEADER=X-Forwarded-User
      - WEBUI_AUTH_COOKIE_AGE=604800 # 7 days in seconds
      - WEBUI_SESSION_COOKIE_AGE=604800 # 7 days in seconds
      # Cookies "sanas" detrás de reverse proxy
      - WEBUI_SESSION_COOKIE_SAME_SITE=lax
      - WEBUI_AUTH_COOKIE_SAME_SITE=lax
      - WEBUI_SESSION_COOKIE_SECURE=true
      - WEBUI_AUTH_COOKIE_SECURE=true
    ports:
      # Solo localhost. Exponerlo a la LAN permite suplantar a cualquier usuario
      # (incluido admin) enviando X-Forwarded-Email: Open WebUI confía en esa
      # cabecera sin comprobar el origen. El acceso legítimo es nginx -> oauth2-proxy.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./openwebui/data:/app/backend/data
      - ./openwebui/custom/apple-touch-icon.png:/app/backend/open_webui/static/apple-touch-icon.png:ro
      - ./openwebui/custom/custom.css:/app/backend/open_webui/static/custom.css:ro
      - ./openwebui/custom/favicon-96x96.png:/app/backend/open_webui/static/favicon-96x96.png:ro
      - ./openwebui/custom/favicon.ico:/app/backend/open_webui/static/favicon.ico:ro
      - ./openwebui/custom/favicon.png:/app/backend/open_webui/static/favicon.png:ro
      - ./openwebui/custom/logo.png:/app/backend/open_webui/static/logo.png:ro
      - ./openwebui/custom/splash.png:/app/backend/open_webui/static/splash.png:ro
    depends_on:
      - rag-api

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: oauth2-proxy
    restart: unless-stopped
    ports:
      # Solo localhost: nginx (en el host) llega por 127.0.0.1:4180.
      - "127.0.0.1:4180:4180"
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
      - ./oauth2-proxy/templates:/etc/oauth2-proxy/templates:ro
    environment:
      - TZ=${TZ}
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
      - --cookie-secret=${OAUTH2_COOKIE_SECRET}
      - --client-id=${OAUTH2_CLIENT_ID}
      - --client-secret=${OAUTH2_CLIENT_SECRET}
      - --redirect-url=${OAUTH2_REDIRECT_URL}
      - --email-domain=${OAUTH2_EMAIL_DOMAINS}
      - --code-challenge-method=S256
      - --provider=oidc
      - --oidc-issuer-url=https://accounts.google.com
      - --http-address=0.0.0.0:4180
      - --upstream=http://openwebui:8080
      - --custom-templates-dir=/etc/oauth2-proxy/templates
      - --cookie-expire=168h
      - --cookie-refresh=0h
    depends_on:
      - openwebui

volumes:
  huggingface_cache:
  models_cache:
  docling_cache:
